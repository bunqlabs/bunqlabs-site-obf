      <script>
document.addEventListener('DOMContentLoaded', () => {
  const rows = Array.from(document.querySelectorAll('.faq1_accordion'));
  const DEBUG = false;
  const log = (...a) => DEBUG && console.log('[FAQ]', ...a);
  const warn = (...a) => DEBUG && console.warn('[FAQ]', ...a);
  // --- Utilities ---
  const getAnswer = (row) => row.querySelector('.faq1_answer');
  const getToggle  = (row) => row.querySelector('.faq1_question');
  // Ensure all are closed by default (even if HTML had .is-open)
  rows.forEach(row => {
    const body = getAnswer(row);
    if (!body) return;
    row.classList.remove('is-open');
    row.setAttribute('aria-expanded', 'false');
    body.style.height = '0px';
  });
  // --- Open/Close with smooth height transition ---
  function closeRow(row){
    const body = getAnswer(row);
    if (!body) return;
    // If it's already 0 or not open, nothing to do
    if (!row.classList.contains('is-open') && (body.style.height === '0px' || body.offsetHeight === 0)) return;
    // If height is 'auto', lock current pixel height first to animate down
    if (getComputedStyle(body).height === 'auto' || body.style.height === 'auto'){
      body.style.height = body.scrollHeight + 'px';
      body.getBoundingClientRect(); // reflow
    }
    body.style.height = '0px';
    row.classList.remove('is-open');
    row.setAttribute('aria-expanded', 'false');
    log('Closed', row);
  }
  function openRow(row){
    const body = getAnswer(row);
    if (!body) return;
    // Start from current computed height (could be 0 or a number) then expand to scrollHeight
    const targetH = body.scrollHeight;
    body.style.height = targetH + 'px';
    row.classList.add('is-open');
    row.setAttribute('aria-expanded', 'true');
    log('Opened to', targetH, row);
  }
  function closeOthers(except){
    rows.forEach(r => { if (r !== except) closeRow(r); });
  }
  // After height transition completes, set to auto so dynamic content isn't clipped
  rows.forEach(row => {
    const body = getAnswer(row);
    if (!body) return;
    body.addEventListener('transitionend', (ev) => {
      if (ev.propertyName !== 'height') return;
      if (row.classList.contains('is-open')) {
        body.style.height = 'auto';
      }
    });
  });
  // Keep open items sized correctly on resize (if any are open)
  window.addEventListener('resize', () => {
    document.querySelectorAll('.faq1_accordion.is-open .faq1_answer').forEach(body => {
      body.style.height = 'auto';
      const h = body.scrollHeight;
      body.style.height = h + 'px';
    });
  });
  // --- Exact match finder for Module by data-section ---
  function findExactTarget(sectionValue) {
    const modules = Array.from(document.getElementsByClassName('module'));
    return modules.find(el => el.getAttribute('data-section') === sectionValue);
  }
  // --- Scrolling helper ---
  function scrollToEl(el, offset = 0) {
    const rect = el.getBoundingClientRect();
    const top = rect.top + window.pageYOffset - offset;
    window.scrollTo({ top, behavior: 'smooth' });
  }
  // --- Open by section value (optionally without scrolling) ---
  function openAccordionBySection(sectionValue, { scroll = true, fromObserver = false } = {}) {
    const row = rows.find(r => r.getAttribute('data-section') === sectionValue);
    if (!row) return;
    if (!row.classList.contains('is-open')) {
      closeOthers(row);
      openRow(row);
    }
    if (scroll) {
      // pause observer reactions briefly to avoid feedback loops
      pauseObserver(700);
      const target = findExactTarget(sectionValue);
      if (target) {
        const FIXED_HEADER_OFFSET = 0; // adjust for sticky header height
        scrollToEl(target, FIXED_HEADER_OFFSET);
        target.setAttribute('tabindex', '-1');
        try { target.focus({ preventScroll: true }); } catch {}
      }
    }
  }
  // --- Click wiring for toggles ---
  rows.forEach(row => {
    const toggle = getToggle(row);
    const body   = getAnswer(row);
    if (!toggle || !body) return;
    // A11y
    toggle.setAttribute('role', 'button');
    toggle.setAttribute('tabindex', toggle.getAttribute('tabindex') || '0');
    row.setAttribute('aria-expanded', 'false');
    // Click to open/close + scroll to matching .Module
    toggle.addEventListener('click', () => {
      const isOpen = row.classList.contains('is-open');
      if (isOpen){
        closeRow(row);
      } else {
        closeOthers(row);
        openRow(row);
        const section = row.getAttribute('data-section');
        if (section != null) {
          pauseObserver(700);
          const target = findExactTarget(section);
          if (target) {
            const FIXED_HEADER_OFFSET = 0;
            scrollToEl(target, FIXED_HEADER_OFFSET);
            target.setAttribute('tabindex', '-1');
            try { target.focus({ preventScroll: true }); } catch {}
          } else {
            warn('No .module found for section:', section);
          }
        }
      }
    });
    // Keyboard (Enter/Space)
    toggle.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggle.click();
      }
    });
  });
  // --- IntersectionObserver: auto-open accordion for section in viewport ---
  let observerPausedUntil = 0;
  function pauseObserver(ms = 600) {
    observerPausedUntil = Date.now() + ms;
  }
  function isObserverPaused() {
    return Date.now() < observerPausedUntil;
  }
  function setupSectionObserver() {
    const modules = Array.from(document.getElementsByClassName('module'));
    if (!modules.length) {
      log('No .Module sections to observe.');
      return;
    }
    // Trigger when ~60% of a section is visible. Adjust as needed.
    const io = new IntersectionObserver((entries) => {
      if (isObserverPaused()) return;
      // Find the most visible intersecting section
      let best = null;
      for (const entry of entries) {
        if (!entry.isIntersecting) continue;
        if (!best || entry.intersectionRatio > best.intersectionRatio) {
          best = entry;
        }
      }
      if (!best) return;
      const sectionValue = best.target.getAttribute('data-section');
      if (!sectionValue) return;
      // Open the matching accordion without scrolling (observer-driven)
      openAccordionBySection(sectionValue, { scroll: false, fromObserver: true });
    }, {
      root: null,
      threshold: [0.3, 0.6, 0.9],   // multiple thresholds; we'll pick the highest visible one
      rootMargin: '0px 0px -20% 0px' // bias toward opening a bit before full center
    });
    modules.forEach(m => io.observe(m));
  }
  setupSectionObserver();
});

  }
  const hasAttr = (node) => node?.closest('[pointer-scramble-text]');
  let activeTarget = null;
  label.textContent = "";
  label.__currentText = "";
  document.addEventListener("pointerover", (e) => {
    const nextTarget = hasAttr(e.target);
    if (nextTarget === activeTarget) return;
    if (nextTarget) {
      const nextText = nextTarget.getAttribute("pointer-scramble-text") || "";
      if (nextText !== label.__currentText) {
        scrambleTo(nextText, DUR_IN);
        label.__currentText = nextText;
      }
      activeTarget = nextTarget;
    } else if (activeTarget) {
      scrambleTo("", DUR_OUT);
      label.__currentText = "";
      activeTarget = null;
    }
  }, true);
  document.addEventListener("pointerout", (e) => {
    const fromTarget = hasAttr(e.target);
    if (!fromTarget) return;
    const into = e.relatedTarget || null;
    const nextTarget = hasAttr(into);
    if (nextTarget) {
      const nextText = nextTarget.getAttribute("pointer-scramble-text") || "";
      if (nextText !== label.__currentText) {
        scrambleTo(nextText, DUR_IN);
        label.__currentText = nextText;
      }
      activeTarget = nextTarget;
    } else {
      scrambleTo("", DUR_OUT);
      label.__currentText = "";
      activeTarget = null;
    }
  }, true);
  addEventListener("mouseleave", () => {
    if (label.__currentText) {
      scrambleTo("", DUR_OUT);
      label.__currentText = "";
      activeTarget = null;
    }
  });
});

        <div class="w-embed w-script"><!--  Clock: dashed ring + red minute arc + seconds hand (exact center, no delay)  -->
          <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
          <script>
document.addEventListener('DOMContentLoaded', () => {
  const slot = document.querySelector('.clock');
  if (!slot) return;
  const host = document.createElement('div');
  host.className = 'radar-clock';
  host.innerHTML = `
    <svg viewBox="0 0 200 200" class="rc-svg" aria-label="Analog clock" role="img">
      <!-- dashed ring -->
      <circle cx="100" cy="100" r="70" class="rc-dash"/>
      <!-- hour labels -->
      <g class="rc-labels"></g>
      <!-- minute highlighted arc -->
      <path class="rc-minute-arc" d="" />
      <!-- seconds hand from center (we'll move x2,y2 each frame) -->
      <line x1="100" y1="100" x2="100" y2="40" class="rc-seconds" />
    </svg>
  `;
  slot.appendChild(host);
  /* styles */
  const style = document.createElement('style');
  style.textContent = `
    .clock { display:flex; justify-content:center; }
    .clock .radar-clock{ width:240px; height:240px; pointer-events:none; }
    .clock .rc-svg{ width:100%; height:100%; display:block; }
    .clock .rc-dash{
      fill:none; stroke:rgba(255,255,255,.45); stroke-width:1.6; stroke-dasharray:4 6;
    }
    .clock .rc-minute-arc{
      fill:none; stroke:#ff3232; stroke-width:3; stroke-linecap:round;
      filter: drop-shadow(0 0 2px rgba(255,50,50,.5));
    }
    .clock .rc-seconds{
      stroke:#ffffff; stroke-width:2; stroke-linecap:round; vector-effect:non-scaling-stroke;
    }
    .clock .rc-labels text{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:7px; letter-spacing:.06em; user-select:none;
      fill: rgba(255,255,255,.38); transition: fill .2s ease;
    }
    .clock .rc-labels text.active{ fill:#ff3232;   font-weight:bold;
 }
  `;
  document.head.appendChild(style);
  /* build labels */
  const labelsGroup = host.querySelector('.rc-labels');
  const cx = 100, cy = 100, rLabels = 82;
  const labels = [];
  for (let i = 1; i <= 12; i++) {
    const ang = (i - 3) * (Math.PI * 2 / 12); // 12 at top
    const x = cx + Math.cos(ang) * rLabels;
    const y = cy + Math.sin(ang) * rLabels;
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', x.toFixed(2));
    t.setAttribute('y', y.toFixed(2));
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','middle');
    t.textContent = String(i).padStart(2,'0');
    labelsGroup.appendChild(t);
    labels.push(t);
  }
  const arc = host.querySelector('.rc-minute-arc');
  const sec = host.querySelector('.rc-seconds');
  /* helpers */
  function polar(cx, cy, r, deg){
    const a = (Math.PI/180) * deg;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  }
  function minuteArcPath(cx, cy, r, angleDeg, widthDeg){
    const start = angleDeg - widthDeg/2, end = angleDeg + widthDeg/2;
    const p0 = polar(cx, cy, r, start), p1 = polar(cx, cy, r, end);
    const large = widthDeg > 180 ? 1 : 0;
    return `M ${p0.x.toFixed(3)} ${p0.y.toFixed(3)} A ${r} ${r} 0 ${large} 1 ${p1.x.toFixed(3)} ${p1.y.toFixed(3)}`;
  }
  const MIN_ARC_SPAN = 4;    // degrees (minute highlight width)
  const SEC_LEN = 50;        // length of seconds hand from center (px)
  /* initial draw (no delay) */
  function drawOnce(){
    const now = new Date();
    const rawHour = now.getHours();
    const hour12 = (rawHour % 12) === 0 ? 12 : (rawHour % 12);
    const m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
    const minuteAngle = (m + (s + ms/1000)/60) * 6; // 6°/min
    const secondAngle = (s + ms/1000) * 6;          // 6°/sec
    // minute arc (rotate so 0° is at 12 o'clock => -90)
    arc.setAttribute('d', minuteArcPath(cx, cy, 70, minuteAngle - 90, MIN_ARC_SPAN));
    // seconds hand: compute endpoint directly (no transforms)
    const end = polar(cx, cy, SEC_LEN, secondAngle - 90);
    sec.setAttribute('x2', end.x.toFixed(2));
    sec.setAttribute('y2', end.y.toFixed(2));
    // highlight current hour
    labels.forEach((el, idx) => el.classList.toggle('active', idx + 1 === hour12));
  }
  drawOnce();
  /* live updates each frame */
  gsap.ticker.add(() => {
    const now = new Date();
    const rawHour = now.getHours();
    const hour12 = (rawHour % 12) === 0 ? 12 : (rawHour % 12);
    const m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
    const minuteAngle = (m + (s + ms/1000)/60) * 6;
    const secondAngle = (s + ms/1000) * 6;
    arc.setAttribute('d', minuteArcPath(cx, cy, 70, minuteAngle - 90, MIN_ARC_SPAN));
    const end = polar(cx, cy, SEC_LEN, secondAngle - 90);
    sec.setAttribute('x2', end.x.toFixed(2));
    sec.setAttribute('y2', end.y.toFixed(2));
    labels.forEach((el, idx) => el.classList.toggle('active', idx + 1 === hour12));
  });
  // resync when returning to the tab
  document.addEventListener('visibilitychange', () => { if (!document.hidden) drawOnce(); });
});
</script>
